---
- name: Create nginx config directory
  file:
    path: /opt/wordpress/nginx
    state: directory
    mode: '0755'

- name: Create nginx config
  copy:
    dest: /opt/wordpress/nginx/nginx.conf
    content: |
      server {
          listen 80;
          return 301 https://$host$request_uri\;
      }

      server {
          listen 443 ssl;
          server_name _;

          ssl_certificate /etc/nginx/ssl/cert.pem;
          ssl_certificate_key /etc/nginx/ssl/key.pem;

          root /var/www/html;
          index index.php;

          location / {
              try_files $uri $uri/ /index.php?$args;
          }

          location ~ \.php$ {
              fastcgi_pass wordpress:9000;
              fastcgi_index index.php;
              include fastcgi_params;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
          }
      }

      server {
          listen 443 ssl;
          server_name pma.*;

          ssl_certificate /etc/nginx/ssl/cert.pem;
          ssl_certificate_key /etc/nginx/ssl/key.pem;

          location / {
              proxy_pass http://phpmyadmin:80\;
              proxy_set_header Host $host;
          }
      }

- name: Create SSL directory
  file:
    path: /opt/wordpress/ssl
    state: directory
    mode: '0755'

- name: Generate self-signed SSL certificate
  command: >
    openssl req -x509 -nodes -days 365 -newkey rsa:2048
    -keyout /opt/wordpress/ssl/key.pem
    -out /opt/wordpress/ssl/cert.pem
    -subj "/C=FR/ST=Paris/L=Paris/O=42/CN=localhost"
  args:
    creates: /opt/wordpress/ssl/cert.pem

- name: Deploy Nginx container
  docker_container:
    name: nginx
    image: nginx:alpine
    state: started
    restart_policy: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/wordpress/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /opt/wordpress/wp:/var/www/html
      - /opt/wordpress/ssl:/etc/nginx/ssl
    networks:
      - name: wp_network
