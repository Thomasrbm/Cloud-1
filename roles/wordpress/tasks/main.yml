---
- name: Create WordPress directory
  file:
    path: /opt/wordpress/wp
    state: directory
    mode: '0755'

- name: Deploy WordPress container
  docker_container:
    name: wordpress
    image: wordpress:php8.1-fpm
    state: started
    restart_policy: always
    env:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_NAME: "{{ mysql_database }}"
      WORDPRESS_DB_USER: "{{ mysql_user }}"
      WORDPRESS_DB_PASSWORD: "{{ mysql_password }}"
    volumes:
      - /opt/wordpress/wp:/var/www/html
    networks:
      - name: wp_network

- name: Deploy phpMyAdmin container
  docker_container:
    name: phpmyadmin
    image: phpmyadmin:latest
    state: started
    restart_policy: always
    env:
      PMA_HOST: mysql
      PMA_PORT: "3306"
    networks:
      - name: wp_network
